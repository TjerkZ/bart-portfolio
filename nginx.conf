server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed Vite assets — cache hard
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Always revalidate index.html so deploys are picked up
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml;
}
