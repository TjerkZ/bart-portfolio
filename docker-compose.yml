# Portainer-ready stack for bart.wanderingwhale.dev
#
# Assumes the host runs Traefik with:
#   - an external network named `proxy`
#   - an entrypoint named `websecure` (HTTPS, :443)
#   - a cert resolver named `myresolver`
# Adjust the labels below if any of those names differ.
#
# Deploys are manual: rebuild + push via `git push origin main`, then
# in Portainer → Stacks → bart-portfolio → "Update the stack" with
# "Re-pull image" checked. No Watchtower.

services:
  portfolio:
    image: ghcr.io/tjerkz/bart-portfolio:latest
    container_name: bart-portfolio
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.bart-portfolio.rule=Host(`bart.wanderingwhale.dev`)
      - traefik.http.routers.bart-portfolio.entrypoints=websecure
      - traefik.http.routers.bart-portfolio.tls.certresolver=myresolver
      - traefik.http.services.bart-portfolio.loadbalancer.server.port=80

networks:
  proxy:
    external: true
